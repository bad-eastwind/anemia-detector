# KAGGLE final DEPLOYABLE segmentation (T4/P100, ~16GB, CUDA). Trains on ALL 218 patients
# (no val split) and saves the checkpoint for inference (src/infer_pipeline.py):
#   outputs/seg/kaggle_segformer_b3/seg_kaggle_final.pt   ({state_dict, cfg})
# Standalone: runs ONLY the `final` protocol -> cheaper to (re)run than cv+loco. Same model
# sizing as seg_kaggle.yaml. Pick the WINNING arch/encoder from your cv/loco run (judge by
# LOCO IoU) and set it here before training the final model.
name: seg_kaggle             # -> checkpoint name seg_kaggle_final.pt
arch: segformer
encoder: mit_b3
encoder_weights: imagenet
res: 512
bs: 12              # T4 x2: ~6 imgs/GPU (same per-card load as old bs6 on one GPU)
grad_accum: 1       # effective batch 12 = old bs6 x accum2, now split across both T4s
multi_gpu: true     # nn.DataParallel across the 2 T4s (no-op on 1 GPU / HPC / local)
epochs: 120
lr: 6.0e-5
weight_decay: 0.01
num_workers: 4
amp: true
aug: heavy
folds: 5
modes: [final]               # run_final -> train_split(all uids, val=None, save_path=...)
seed: 42
out_subdir: kaggle_segformer_b3
